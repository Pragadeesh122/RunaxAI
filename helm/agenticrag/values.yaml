# ---------------------------------------------------------------------------
# RunaxAI Helm Chart — values.yaml
# Defaults tuned for a single-node K3s deployment (Mac Mini)
# ---------------------------------------------------------------------------

global:
  imagePullSecrets: []
  storageClass: ""  # empty = cluster default (K3s: local-path)
  # For local OrbStack dev set to LoadBalancer (OrbStack assigns routable IPs).
  # For production leave as ClusterIP and use Ingress instead.
  serviceType: LoadBalancer

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# API (FastAPI backend)
# ---------------------------------------------------------------------------
api:
  image:
    repository: agenticrag-api
    tag: ""  # defaults to Chart.appVersion
    digest: ""  # if set (sha256:...), overrides tag for content-addressed deploys
    pullPolicy: IfNotPresent
  replicaCount: 1
  uvicornWorkers: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: false
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Worker (ARQ async task worker — same image as API)
# ---------------------------------------------------------------------------
worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  podDisruptionBudget:
    enabled: false
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Frontend (Next.js)
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: agenticrag-frontend
    tag: ""  # defaults to Chart.appVersion
    digest: ""  # if set (sha256:...), overrides tag for content-addressed deploys
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: false
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# PostgreSQL (conditional — set enabled: false to use external)
# ---------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg17
  storage:
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # External Postgres (used when enabled: false)
  external:
    host: ""
    port: "5432"
    database: "agenticrag"

# ---------------------------------------------------------------------------
# Redis (conditional)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  auth:
    enabled: false  # enable requirepass on chart-managed Redis (password from chart or external secret)
  image:
    repository: redis/redis-stack-server
    tag: latest
  storage:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # External Redis (used when enabled: false)
  external:
    host: ""
    port: "6379"

# ---------------------------------------------------------------------------
# MinIO (conditional)
# ---------------------------------------------------------------------------
minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
  storage:
    size: 50Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  bucketName: agenticrag-documents
  # Optional ingress to expose MinIO to browsers for direct presigned-URL uploads.
  ingress:
    enabled: false
    host: "storage.agenticrag.local"
    annotations: {}
    tls: []
    #  - secretName: minio-tls
    #    hosts:
    #      - storage.agenticrag.local
  # External MinIO / S3 (used when enabled: false)
  external:
    endpoint: ""
    secure: false

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: "traefik"  # K3s ships with Traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: agenticrag.local
      paths:
        # API paths
        - path: /auth
          pathType: Prefix
          service: api
        - path: /users
          pathType: Prefix
          service: api
        - path: /chat
          pathType: Prefix
          service: api
        - path: /session
          pathType: Prefix
          service: api
        - path: /projects
          pathType: Prefix
          service: api
        - path: /metrics
          pathType: Prefix
          service: api
        - path: /health
          pathType: Prefix
          service: api
        - path: /ready
          pathType: Prefix
          service: api
        # Frontend (catch-all, must be last)
        - path: /
          pathType: Prefix
          service: frontend
  tls: []
  #  - secretName: agenticrag-tls
  #    hosts:
  #      - agenticrag.local

# ---------------------------------------------------------------------------
# Secrets
# ---------------------------------------------------------------------------
secrets:
  # Set to true to use a pre-existing Secret (e.g. sealed-secrets, external-secrets)
  externalSecret: false
  secretName: ""  # name of pre-existing secret (when externalSecret: true)

  # Values used when externalSecret: false.
  # In production, prefer sealed-secrets or external-secrets-operator.
  dbAdminUser: "admin"
  dbAdminPassword: ""     # REQUIRED
  dbPassword: ""          # REQUIRED (for llm_reader role)
  secretKey: ""           # REQUIRED (JWT signing key)
  redisPassword: ""       # optional
  minioAccessKey: ""      # REQUIRED
  minioSecretKey: ""      # REQUIRED
  pineconeApiKey: ""
  openaiApiKey: ""
  anthropicApiKey: ""
  geminiApiKey: ""
  xaiApiKey: ""
  openrouterApiKey: ""
  braveApiKey: ""
  authGoogleId: ""
  authGoogleSecret: ""
  authGithubId: ""
  authGithubSecret: ""

# ---------------------------------------------------------------------------
# Non-sensitive configuration
# ---------------------------------------------------------------------------
config:
  dbName: "agenticrag"
  dbPoolSize: "5"
  dbMaxOverflow: "10"
  dbPoolRecycle: "1800"
  logFormat: "json"
  logLevel: "INFO"
  otelEnabled: "true"
  otelExporterEndpoint: ""  # auto-computed if monitoring.tempo.enabled
  documentIngestMode: "worker"
  # Model for the general-chat orchestrator + intent router. Leave empty to use
  # the app default (gpt-5.4). Set a provider-prefixed string to switch, e.g.
  # "openrouter/deepseek/deepseek-v4-flash". Maps to the ORCHESTRATOR_MODEL env var.
  orchestratorModel: ""
  corsAllowedOrigins: "http://localhost:3000"
  corsAllowLocalhostRegex: "false"
  # Auto-generated FastAPI docs (/docs, /redoc, /openapi.json). Off in prod
  # to avoid leaking the API schema; flip to "true" only when needed.
  enableApiDocs: "false"
  # Override the public frontend URL used for OAuth redirect URIs.
  # For local dev via SSH tunnel set this to http://localhost:3000.
  # Leave empty to auto-compute from ingress host (production).
  frontendUrl: "http://localhost:3000"
  # Public URL of the API as seen by the browser (sets NEXT_PUBLIC_API_URL).
  # For local dev via SSH tunnel set to http://localhost:8000.
  # Leave empty to auto-compute from ingress host (production).
  apiPublicUrl: "http://localhost:8000"
  minioPublicBaseUrl: "http://localhost:9000"  # SSH-tunnel: -L 9000:192.168.139.2:9000

# ---------------------------------------------------------------------------
# Cloudflare Tunnel — zero port-forwarding ingress via cloudflared
# ---------------------------------------------------------------------------
tunnel:
  enabled: false
  image: "cloudflare/cloudflared:latest"

# ---------------------------------------------------------------------------
# Cloudflare DDNS — keeps DNS A records updated for dynamic IPs
# ---------------------------------------------------------------------------
ddns:
  enabled: false
  image: "favonia/cloudflare-ddns:1"
  domains: []
  proxied: true
  ipv6: false

# ---------------------------------------------------------------------------
# cert-manager + Cloudflare DNS-01 (disabled by default — enable in prod)
# ---------------------------------------------------------------------------
certManager:
  enabled: false
  email: ""                   # Let's Encrypt notification email
  cloudflare:
    apiToken: ""              # Cloudflare API token (Zone:DNS:Edit)

# ---------------------------------------------------------------------------
# Network Policies
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false

# ---------------------------------------------------------------------------
# Monitoring (optional lightweight stack)
# Deploy kube-prometheus-stack separately for production.
# Dashboard ConfigMaps are always created for Grafana sidecar discovery.
# ---------------------------------------------------------------------------
monitoring:
  enabled: true
  grafana:
    adminUser: "admin"
    adminPassword: "admin"
    image: "grafana/grafana:11.1.5"
    storage:
      size: 1Gi
    ingress:
      enabled: false
      host: ""
      annotations: {}
      tls: []
      basicAuth:
        enabled: false
        users: ""   # htpasswd format — generate with: htpasswd -nb <user> <password>
  prometheus:
    image: "prom/prometheus:v2.54.1"
    storage:
      size: 2Gi
  loki:
    image: "grafana/loki:2.9.8"
    storage:
      size: 2Gi
  promtail:
    image: "grafana/promtail:2.9.8"
  tempo:
    enabled: true
    image: "grafana/tempo:2.6.1"
    storage:
      size: 2Gi

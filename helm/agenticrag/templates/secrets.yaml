{{- if not .Values.secrets.externalSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenticrag.secretName" . }}
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
type: Opaque
data:
  DB_ADMIN_USER: {{ .Values.secrets.dbAdminUser | b64enc | quote }}
  DB_ADMIN_PASSWORD: {{ required "secrets.dbAdminPassword is required" .Values.secrets.dbAdminPassword | b64enc | quote }}
  DB_USER: {{ "llm_reader" | b64enc | quote }}
  DB_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | b64enc | quote }}
  SECRET_KEY: {{ required "secrets.secretKey is required" .Values.secrets.secretKey | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | default "" | b64enc | quote }}
  MINIO_ACCESS_KEY: {{ required "secrets.minioAccessKey is required" .Values.secrets.minioAccessKey | b64enc | quote }}
  MINIO_SECRET_KEY: {{ required "secrets.minioSecretKey is required" .Values.secrets.minioSecretKey | b64enc | quote }}
  PINECONE_API_KEY: {{ .Values.secrets.pineconeApiKey | default "" | b64enc | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "" | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | b64enc | quote }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | default "" | b64enc | quote }}
  XAI_API_KEY: {{ .Values.secrets.xaiApiKey | default "" | b64enc | quote }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | default "" | b64enc | quote }}
  BRAVE_API_KEY: {{ .Values.secrets.braveApiKey | default "" | b64enc | quote }}
  AUTH_GOOGLE_ID: {{ .Values.secrets.authGoogleId | default "" | b64enc | quote }}
  AUTH_GOOGLE_SECRET: {{ .Values.secrets.authGoogleSecret | default "" | b64enc | quote }}
  AUTH_GITHUB_ID: {{ .Values.secrets.authGithubId | default "" | b64enc | quote }}
  AUTH_GITHUB_SECRET: {{ .Values.secrets.authGithubSecret | default "" | b64enc | quote }}
  CLOUDFLARE_TUNNEL_TOKEN: {{ .Values.secrets.cloudflareTunnelToken | default "" | b64enc | quote }}
{{- end }}

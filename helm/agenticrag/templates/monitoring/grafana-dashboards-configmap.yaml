{{/*
Grafana dashboard ConfigMaps.
Dashboard JSONs are packaged from helm/agenticrag/files/grafana/dashboards/
(kept in sync with monitoring/grafana/provisioning/dashboards/ — enforced by
tests/test_helm_grafana_sync.py). The grafana_dashboard label lets the Grafana
sidecar in kube-prometheus-stack auto-discover these dashboards too — even
when monitoring.enabled=false.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana-dashboards
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "RunaxAI"
data:
{{ (.Files.Glob "files/grafana/dashboards/*.json").AsConfig | indent 2 }}

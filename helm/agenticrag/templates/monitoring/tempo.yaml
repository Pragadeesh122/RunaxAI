{{- if and .Values.monitoring.enabled .Values.monitoring.tempo.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticrag.fullname" . }}-tempo-config
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
data:
  config.yml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: "0.0.0.0:4318"
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 24h
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agenticrag.fullname" . }}-tempo-data
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.monitoring.tempo.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenticrag.fullname" . }}-tempo
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agenticrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        {{- include "agenticrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tempo
    spec:
      containers:
        - name: tempo
          image: {{ .Values.monitoring.tempo.image }}
          args:
            - -config.file=/etc/tempo/config.yml
          ports:
            - name: http
              containerPort: 3200
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "agenticrag.fullname" . }}-tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agenticrag.fullname" . }}-tempo-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenticrag.fullname" . }}-tempo
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  selector:
    {{- include "agenticrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-http
      port: 4318
      targetPort: 4318
{{- end }}

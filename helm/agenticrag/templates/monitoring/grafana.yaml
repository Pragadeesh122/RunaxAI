{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana-provisioning
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "agenticrag.fullname" . }}-prometheus:9090
        isDefault: true
        editable: true
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://{{ include "agenticrag.fullname" . }}-loki:3100
        jsonData:
          maxLines: 2000
        editable: true
      {{- if .Values.monitoring.tempo.enabled }}
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://{{ include "agenticrag.fullname" . }}-tempo:3200
        editable: true
      {{- end }}
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: RunaxAI
        orgId: 1
        folder: RunaxAI
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards
---
{{/*
Alert rules are packaged from helm/agenticrag/files/grafana/alerting/ (kept in
sync with monitoring/grafana/provisioning/alerting/ — enforced by
tests/test_helm_grafana_sync.py). Datasource UIDs (prometheus/loki) match the
provisioned datasources above.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana-alerting
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
{{ (.Files.Glob "files/grafana/alerting/*.yml").AsConfig | indent 2 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana-data
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.monitoring.grafana.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "agenticrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "agenticrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.monitoring.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPassword | quote }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: alerting
              mountPath: /etc/grafana/provisioning/alerting
            - name: dashboards
              mountPath: /etc/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "agenticrag.fullname" . }}-grafana-provisioning
        - name: alerting
          configMap:
            name: {{ include "agenticrag.fullname" . }}-grafana-alerting
        - name: dashboards
          configMap:
            name: {{ include "agenticrag.fullname" . }}-grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agenticrag.fullname" . }}-grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.global.serviceType | default "ClusterIP" }}
  selector:
    {{- include "agenticrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  ports:
    - name: http
      port: 3001
      targetPort: 3000
{{- end }}
{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.ingress.enabled }}
{{- if .Values.monitoring.grafana.ingress.basicAuth.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana-basicauth
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
stringData:
  users: {{ required "monitoring.grafana.ingress.basicAuth.users is required when basicAuth.enabled=true" .Values.monitoring.grafana.ingress.basicAuth.users | quote }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: grafana-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  basicAuth:
    secret: {{ include "agenticrag.fullname" . }}-grafana-basicauth
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  annotations:
    {{- with .Values.monitoring.grafana.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.monitoring.grafana.ingress.basicAuth.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-grafana-auth@kubernetescrd
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.monitoring.grafana.ingress.tls }}
  tls:
    {{- range .Values.monitoring.grafana.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.monitoring.grafana.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "agenticrag.fullname" . }}-grafana
                port:
                  number: 3001
{{- end }}

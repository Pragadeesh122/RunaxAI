apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticrag.configMapName" . }}
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
data:
  DB_NAME: {{ .Values.config.dbName | quote }}
  DB_HOST: {{ include "agenticrag.dbHost" . | quote }}
  DB_PORT: {{ include "agenticrag.dbPort" . | quote }}
  DB_POOL_SIZE: {{ .Values.config.dbPoolSize | quote }}
  DB_MAX_OVERFLOW: {{ .Values.config.dbMaxOverflow | quote }}
  DB_POOL_RECYCLE: {{ .Values.config.dbPoolRecycle | quote }}
  REDIS_HOST: {{ include "agenticrag.redisHost" . | quote }}
  REDIS_PORT: {{ include "agenticrag.redisPort" . | quote }}
  MINIO_ENDPOINT: {{ include "agenticrag.minioEndpoint" . | quote }}
  MINIO_SECURE: {{ include "agenticrag.minioSecure" . | quote }}
  MINIO_PUBLIC_BASE_URL: {{ include "agenticrag.minioPublicBaseUrl" . | quote }}
  APP_ENV: "production"
  COOKIE_SECURE: {{ if .Values.ingress.tls }}"true"{{ else }}"false"{{ end }}
  OTEL_ENABLED: {{ if (include "agenticrag.otelEndpoint" .) }}"true"{{ else }}"false"{{ end }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ include "agenticrag.otelEndpoint" . | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DOCUMENT_INGEST_MODE: {{ .Values.config.documentIngestMode | quote }}
  CORS_ALLOWED_ORIGINS: {{ include "agenticrag.corsAllowedOrigins" . | quote }}
  CORS_ALLOW_LOCALHOST_REGEX: {{ .Values.config.corsAllowLocalhostRegex | quote }}
  FRONTEND_URL: {{ include "agenticrag.frontendUrl" . | quote }}
  COOKIE_DOMAIN: {{ .Values.config.cookieDomain | default "" | quote }}
  ENABLE_API_DOCS: {{ .Values.config.enableApiDocs | default "false" | quote }}
  {{- with .Values.config.orchestratorModel }}
  ORCHESTRATOR_MODEL: {{ . | quote }}
  {{- end }}

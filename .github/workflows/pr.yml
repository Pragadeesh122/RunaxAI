name: PR Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # API tests — sqlite in-memory fixtures, no external deps required.
  # ---------------------------------------------------------------------------
  test-api:
    name: API tests
    runs-on: agenticrag-runners

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest

  # ---------------------------------------------------------------------------
  # Sanity-build both images on PR (no push, no deploy). Catches Dockerfile
  # regressions before merge. Reuses the registry buildcache so it's fast.
  # ---------------------------------------------------------------------------
  build:
    name: Build images
    runs-on: agenticrag-runners
    permissions:
      contents: read
      packages: read
    env:
      API_IMAGE: ghcr.io/pragadeesh122/agenticrag-api
      FRONTEND_IMAGE: ghcr.io/pragadeesh122/agenticrag-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/arm64
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          platforms: linux/arm64
          build-args: NEXT_PUBLIC_API_URL=https://api.runaxai.com
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache

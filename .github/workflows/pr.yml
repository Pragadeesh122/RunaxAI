name: PR Validation

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect what changed so downstream jobs can skip when untouched.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 2
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'agents/**'
              - 'pipeline/**'
              - 'functions/**'
              - 'memory/**'
              - 'services/**'
              - 'database/**'
              - 'prompts/**'
              - 'tasks/**'
              - 'observability/**'
              - 'alembic/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile'
              - '.github/workflows/pr.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/pr.yml'
            helm:
              - 'helm/agenticrag/**'
              - '.github/workflows/pr.yml'

  # ---------------------------------------------------------------------------
  # API tests — sqlite in-memory fixtures, no external deps required.
  # ---------------------------------------------------------------------------
  test-api:
    name: API tests
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run pytest

  # ---------------------------------------------------------------------------
  # Sanity-build both images on PR (no push, no deploy). Catches Dockerfile
  # regressions before merge. Uses registry buildcache.
  # ---------------------------------------------------------------------------
  build:
    name: Build images
    needs: changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    env:
      API_IMAGE: ghcr.io/pragadeesh122/agenticrag-api
      FRONTEND_IMAGE: ghcr.io/pragadeesh122/agenticrag-frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API
        if: needs.changes.outputs.api == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/arm64
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache

      - name: Build frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          platforms: linux/arm64
          build-args: NEXT_PUBLIC_API_URL=https://api.runaxai.com
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache

  # ---------------------------------------------------------------------------
  # Helm chart validation — lints templates and renders the prod overlay so
  # bad values land at PR review time, not at deploy time.
  # ---------------------------------------------------------------------------
  helm-lint:
    name: Helm chart lint
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 \
            | DESIRED_VERSION=v3.16.4 bash

      - name: helm lint (chart defaults)
        run: helm lint helm/agenticrag/

      # Render with prod overlay + stubbed required secrets so the templates
      # actually fully evaluate. We do NOT push or apply anything — pure
      # client-side render. The grep at the end is a regression test on the
      # apiImage / frontendImage helpers (digest path).
      - name: helm template (prod overlay, stubbed secrets)
        run: |
          helm template ci helm/agenticrag/ \
            -f helm/agenticrag/values.yaml \
            -f helm/agenticrag/values.prod.yaml \
            --set secrets.minioAccessKey=x \
            --set secrets.minioSecretKey=x \
            --set secrets.dbAdminPassword=x \
            --set secrets.dbPassword=x \
            --set secrets.secretKey=x \
            --set api.image.repository=ghcr.io/test/api \
            --set api.image.digest=sha256:deadbeef \
            --set frontend.image.repository=ghcr.io/test/frontend \
            --set frontend.image.digest=sha256:cafef00d \
            > /tmp/rendered.yaml
          echo "rendered $(wc -l < /tmp/rendered.yaml) lines"

      - name: Verify digest path renders correctly
        run: |
          if ! grep -q "image: ghcr.io/test/api@sha256:deadbeef" /tmp/rendered.yaml; then
            echo "API image is not rendering with the digest form — apiImage helper regressed."
            exit 1
          fi
          if ! grep -q "image: ghcr.io/test/frontend@sha256:cafef00d" /tmp/rendered.yaml; then
            echo "Frontend image is not rendering with the digest form — frontendImage helper regressed."
            exit 1
          fi
          echo "digest-form images present"
